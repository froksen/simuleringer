<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Radioaktiv Stråling – Simulering</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Exo+2:wght@300;400;600&display=swap');

  :root {
    --bg: #0a0e1a;
    --panel: #111827;
    --border: #1e3a5f;
    --alpha-color: #ff6b35;
    --beta-color: #00d4ff;
    --gamma-color: #a855f7;
    --geiger-color: #22c55e;
    --text: #e2e8f0;
    --muted: #64748b;
    --highlight: #f0c040;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Exo 2', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 16px;
  }

  h1 {
    font-family: 'Orbitron', monospace;
    font-size: clamp(1rem, 3vw, 1.6rem);
    color: var(--highlight);
    text-align: center;
    letter-spacing: 2px;
    margin-bottom: 6px;
    text-shadow: 0 0 20px rgba(240,192,64,0.4);
  }

  .subtitle {
    color: var(--muted);
    font-size: 0.82rem;
    text-align: center;
    margin-bottom: 16px;
  }

  .main-layout {
    display: flex;
    flex-direction: column;
    gap: 14px;
    width: 100%;
    max-width: 980px;
  }

  /* ── Controls ── */
  .controls {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 12px;
  }

  .ctrl-box {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px;
  }

  .ctrl-box h3 {
    font-family: 'Orbitron', monospace;
    font-size: 0.65rem;
    color: var(--muted);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  .btn-group { display: flex; flex-wrap: wrap; gap: 7px; }

  .btn {
    padding: 8px 14px;
    border-radius: 8px;
    border: 2px solid transparent;
    font-family: 'Exo 2', sans-serif;
    font-weight: 600;
    font-size: 0.82rem;
    cursor: pointer;
    background: #1e293b;
    color: var(--text);
    transition: all 0.2s;
  }
  .btn:hover { transform: translateY(-1px); filter: brightness(1.2); }

  .btn.active { border-color: currentColor; filter: brightness(1.3); }

  .btn-alpha  { color: var(--alpha-color); }
  .btn-beta   { color: var(--beta-color); }
  .btn-gamma  { color: var(--gamma-color); }

  .btn-alpha.active  { background: rgba(255,107,53,0.2); }
  .btn-beta.active   { background: rgba(0,212,255,0.2); }
  .btn-gamma.active  { background: rgba(168,85,247,0.2); }

  .btn-mat { font-size: 0.78rem; padding: 7px 11px; color: #94a3b8; }
  .btn-mat.active { color: var(--highlight); border-color: var(--highlight); background: rgba(240,192,64,0.12); }
  .btn-mat.none-btn.active { color: #94a3b8; border-color: #475569; background: #1e293b; }

  .slider-row { display: flex; align-items: center; gap: 10px; }
  .slider-row label { font-size: 0.8rem; color: var(--muted); white-space: nowrap; }
  input[type=range] {
    flex: 1;
    accent-color: var(--highlight);
    height: 4px;
    cursor: pointer;
  }
  #rateVal {
    font-family: 'Orbitron', monospace;
    font-size: 0.85rem;
    color: var(--highlight);
    min-width: 28px;
    text-align: right;
  }

  /* ── Canvas area ── */
  .canvas-wrap {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
    position: relative;
  }

  canvas {
    display: block;
    width: 100%;
    height: auto;
  }

  /* ── Stats ── */
  .stats-row {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
  }

  .stat-card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px;
    text-align: center;
  }

  .stat-card .label {
    font-size: 0.7rem;
    color: var(--muted);
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  .stat-card .value {
    font-family: 'Orbitron', monospace;
    font-size: 1.6rem;
    font-weight: 700;
  }

  .stat-card .sub {
    font-size: 0.72rem;
    color: var(--muted);
    margin-top: 3px;
  }

  .val-emitted  { color: var(--highlight); }
  .val-blocked  { color: #f87171; }
  .val-detected { color: var(--geiger-color); }

  /* ── Info box ── */
  .info-box {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 18px;
    font-size: 0.82rem;
    line-height: 1.6;
    color: #94a3b8;
  }

  .info-box strong { color: var(--text); }

  .badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 4px;
    font-weight: 700;
    font-size: 0.78rem;
    margin-right: 4px;
  }
  .badge-alpha { background: rgba(255,107,53,0.25); color: var(--alpha-color); }
  .badge-beta  { background: rgba(0,212,255,0.25);  color: var(--beta-color); }
  .badge-gamma { background: rgba(168,85,247,0.25); color: var(--gamma-color); }

  /* Reset btn */
  .reset-btn {
    background: #1e293b;
    border: 1px solid #334155;
    color: #94a3b8;
    border-radius: 8px;
    padding: 8px 16px;
    font-family: 'Exo 2', sans-serif;
    font-size: 0.82rem;
    cursor: pointer;
    transition: all 0.2s;
  }
  .reset-btn:hover { background: #334155; color: var(--text); }

  .ctrl-footer { display: flex; justify-content: flex-end; }
</style>
</head>
<body>

<h1>☢ Radioaktiv Stråling</h1>
<p class="subtitle">Simulering til fysikundervisning – 9. klasse</p>

<div class="main-layout">

  <!-- Controls -->
  <div class="controls">

    <!-- Radiation type -->
    <div class="ctrl-box">
      <h3>Strålingskilde</h3>
      <div class="btn-group">
        <button class="btn btn-alpha active" onclick="setType('alpha')">α Alfa</button>
        <button class="btn btn-beta"  onclick="setType('beta')">β Beta</button>
        <button class="btn btn-gamma" onclick="setType('gamma')">γ Gamma</button>
      </div>
    </div>

    <!-- Material -->
    <div class="ctrl-box">
      <h3>Materiale foran kilden</h3>
      <div class="btn-group">
        <button class="btn btn-mat none-btn active" onclick="setMaterial('ingen')">Ingen</button>
        <button class="btn btn-mat" onclick="setMaterial('papir')">📄 Papir</button>
        <button class="btn btn-mat" onclick="setMaterial('koed')">🥩 Kødpålæg</button>
        <button class="btn btn-mat" onclick="setMaterial('kartofler')">🥔 Kartofler</button>
        <button class="btn btn-mat" onclick="setMaterial('fisk')">🐟 Fisk</button>
        <button class="btn btn-mat" onclick="setMaterial('jern')">🔩 Jern</button>
        <button class="btn btn-mat" onclick="setMaterial('bly')">⚫ Bly</button>
      </div>
    </div>

    <!-- Rate + reset -->
    <div class="ctrl-box">
      <h3>Antal partikler</h3>
      <div class="slider-row">
        <label>Lav</label>
        <input type="range" id="rateSlider" min="1" max="20" value="6" oninput="setRate(this.value)">
        <label>Høj</label>
        <span id="rateVal">6</span>
      </div>
      <div class="ctrl-footer" style="margin-top:12px;">
        <button class="reset-btn" onclick="resetCounters()">↺ Nulstil tæller</button>
      </div>
    </div>

  </div>

  <!-- Canvas -->
  <div class="canvas-wrap">
    <canvas id="sim" height="320"></canvas>
  </div>

  <!-- Stats -->
  <div class="stats-row">
    <div class="stat-card">
      <div class="label">Udsendt</div>
      <div class="value val-emitted" id="sEmit">0</div>
      <div class="sub">partikler</div>
    </div>
    <div class="stat-card">
      <div class="label">Blokeret</div>
      <div class="value val-blocked" id="sBlock">0</div>
      <div class="sub">af materialet</div>
    </div>
    <div class="stat-card">
      <div class="label">Opfanget</div>
      <div class="value val-detected" id="sDetect">0</div>
      <div class="sub">af Geiger-rør</div>
    </div>
  </div>

  <!-- Info -->
  <div class="info-box" id="infoBox">
    Vælg en strålingskilde og eventuelt et materiale for at starte simuleringen.
  </div>

</div>

<script>
// ── State ──────────────────────────────────────────────────────────────────
let type     = 'alpha';
let material = 'ingen';
let rate     = 6;
let emitted  = 0;
let blocked  = 0;
let detected = 0;
let particles = [];
let frame    = 0;

// ── Penetration table ──────────────────────────────────────────────────────
// blockChance: probability (0-1) a particle is blocked by this material
const penetration = {
  //          ingen   papir   koed   kartofler  fisk   jern   bly
  alpha: {   ingen:0, papir:0.99, koed:0.99, kartofler:0.99, fisk:0.99, jern:1.00, bly:1.00 },
  beta:  {   ingen:0, papir:0.25, koed:0.30, kartofler:0.28, fisk:0.26, jern:0.90, bly:0.98 },
  gamma: {   ingen:0, papir:0.02, koed:0.05, kartofler:0.04, fisk:0.03, jern:0.45, bly:0.90 },
};

// ── Info texts ─────────────────────────────────────────────────────────────
const typeInfo = {
  alpha: '<span class="badge badge-alpha">α Alfa</span> Alfastråling består af store, tunge partikler (2 protoner + 2 neutroner). Den stoppes meget let – selv et stykke papir eller huden er nok til at blokere den.',
  beta:  '<span class="badge badge-beta">β Beta</span> Betastråling er hurtige elektroner. Den trænger lidt dybere end alfa, men stoppes af f.eks. aluminium eller jern.',
  gamma: '<span class="badge badge-gamma">γ Gamma</span> Gammastråling er elektromagnetisk stråling (som lys, men langt kraftigere). Den trænger dybt ind i næsten alt – kun tykt bly eller beton bremser den effektivt.',
};

const matInfo = {
  ingen:     'Intet materiale foran – alle partikler rejser frit.',
  papir:     '📄 Papir: Meget tynd barriere. Stopper alfa helt, men beta og gamma slipper næsten igennem.',
  koed:      '🥩 Kødpålæg: Biologisk væv. Stopper alfa, bremser beta lidt, gamma næsten ikke.',
  kartofler: '🥔 Kartofler: Ligner biologisk væv. Stopper alfa, svagt mod beta og gamma.',
  fisk:      '🐟 Fisk: Biologisk væv med noget vand. Ligner kød.',
  jern:      '🔩 Jern: Metal. Stopper alfa og bremser beta kraftigt. Bremser gamma delvist.',
  bly:       '⚫ Bly: Meget tæt metal. Den bedste afskærmning – bremser selv gammastråling kraftigt.',
};

// ── Colors ─────────────────────────────────────────────────────────────────
const typeColor = { alpha:'#ff6b35', beta:'#00d4ff', gamma:'#a855f7' };
const typeGlow  = { alpha:'rgba(255,107,53,0.5)', beta:'rgba(0,212,255,0.5)', gamma:'rgba(168,85,247,0.5)' };

// ── Canvas setup ───────────────────────────────────────────────────────────
const canvas = document.getElementById('sim');
const ctx    = canvas.getContext('2d');

const W = 900, H = 320;
canvas.width  = W;
canvas.height = H;

// Layout constants
const SRC_X  = 80,  SRC_Y  = H/2;
const MAT_X  = 330, MAT_W  = 50;
const GEI_X  = W - 100, GEI_Y = H/2, GEI_W = 60, GEI_H = 140;

// ── Particle class ─────────────────────────────────────────────────────────
class Particle {
  constructor() {
    this.x    = SRC_X + 20;
    this.y    = SRC_Y + (Math.random()-0.5)*30;
    this.vy   = (Math.random()-0.5)*1.2;
    this.speed = type==='gamma' ? 6 : type==='beta' ? 4 : 2.8;
    this.type  = type;
    this.color = typeColor[type];
    this.size  = type==='alpha' ? 5 : type==='beta' ? 3.5 : 2.5;
    this.alive  = true;
    this.blocked = false;
    this.detected = false;
    this.trail  = [];
    this.opacity = 1;
    this.fadeOut = false;
    this.fadeTick = 0;
    // Gamma gets a slight wave
    this.wave  = type==='gamma' ? Math.random()*Math.PI*2 : 0;
    this.waveA = type==='gamma' ? 12 : 0;
    this.waveF = type==='gamma' ? 0.08 : 0;
    emitted++;
    updateStats();
  }

  update() {
    if (this.fadeOut) {
      this.fadeTick++;
      this.opacity = Math.max(0, 1 - this.fadeTick/18);
      if (this.opacity <= 0) { this.alive = false; }
      return;
    }

    this.trail.push({x:this.x, y:this.y});
    if (this.trail.length > 14) this.trail.shift();

    this.x += this.speed;
    this.y += this.vy;
    if (this.waveA) this.y += Math.sin(this.wave + this.x*this.waveF)*0.6;

    // Bounce softly off top/bottom
    if (this.y < 10 || this.y > H-10) this.vy *= -1;

    // Hit material?
    if (material !== 'ingen' && this.x >= MAT_X && this.x <= MAT_X + MAT_W && !this.blocked) {
      const chance = penetration[this.type][material];
      if (Math.random() < chance) {
        this.blocked = true;
        blocked++;
        this.color = '#475569';
        this.speed = 0.3;
        this.vy *= 0.2;
        setTimeout(() => { this.fadeOut = true; }, 300 + Math.random()*400);
        updateStats();
        return;
      }
    }

    // Hit geiger?
    if (!this.detected && this.x >= GEI_X - GEI_W/2 && this.x <= GEI_X + GEI_W/2
        && this.y >= GEI_Y - GEI_H/2 && this.y <= GEI_Y + GEI_H/2) {
      this.detected = true;
      detected++;
      pulseGeiger();
      this.color = '#22c55e';
      this.fadeOut = true;
      updateStats();
    }

    // Off screen
    if (this.x > W + 20) { this.alive = false; }
  }

  draw() {
    // Trail
    for (let i=0; i<this.trail.length; i++) {
      const t = i/this.trail.length;
      ctx.globalAlpha = t * 0.35 * this.opacity;
      ctx.beginPath();
      ctx.arc(this.trail[i].x, this.trail[i].y, this.size*t*0.8, 0, Math.PI*2);
      ctx.fillStyle = this.color;
      ctx.fill();
    }
    // Particle
    ctx.globalAlpha = this.opacity;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI*2);
    ctx.fillStyle = this.color;
    ctx.shadowColor = this.color;
    ctx.shadowBlur  = 10;
    ctx.fill();
    ctx.shadowBlur  = 0;
    ctx.globalAlpha = 1;
  }
}

// ── Geiger pulse ───────────────────────────────────────────────────────────
let geigerPulse = 0;
function pulseGeiger() { geigerPulse = 1; }

// ── Spawn logic ────────────────────────────────────────────────────────────
let spawnTick = 0;
function maybeSpawn() {
  spawnTick++;
  const interval = Math.max(2, Math.round(30/rate));
  if (spawnTick % interval === 0) {
    particles.push(new Particle());
  }
}

// ── Draw scene ─────────────────────────────────────────────────────────────
function drawScene() {
  // Background
  ctx.fillStyle = '#0a0e1a';
  ctx.fillRect(0,0,W,H);

  // Grid lines (subtle)
  ctx.strokeStyle = 'rgba(30,58,95,0.3)';
  ctx.lineWidth = 1;
  for (let x=0; x<W; x+=50) {
    ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke();
  }
  for (let y=0; y<H; y+=50) {
    ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke();
  }

  // ── Source ──
  const sc = typeColor[type];
  const sg = typeGlow[type];

  // Glow
  const srcGrad = ctx.createRadialGradient(SRC_X, SRC_Y, 5, SRC_X, SRC_Y, 50);
  srcGrad.addColorStop(0, sg);
  srcGrad.addColorStop(1, 'transparent');
  ctx.fillStyle = srcGrad;
  ctx.fillRect(SRC_X-50, SRC_Y-50, 100, 100);

  // Body
  ctx.fillStyle = '#1e293b';
  ctx.strokeStyle = sc;
  ctx.lineWidth = 2;
  roundRect(ctx, SRC_X-28, SRC_Y-38, 56, 76, 10);
  ctx.fill(); ctx.stroke();

  // Warning symbol
  ctx.font = '22px serif';
  ctx.textAlign = 'center';
  ctx.fillText('☢', SRC_X, SRC_Y+4);

  // Label
  ctx.fillStyle = sc;
  ctx.font = 'bold 11px "Exo 2", sans-serif';
  ctx.fillText(type.toUpperCase(), SRC_X, SRC_Y+26);

  // Emission port
  ctx.fillStyle = sc;
  ctx.beginPath();
  ctx.arc(SRC_X+28, SRC_Y, 5, 0, Math.PI*2);
  ctx.fill();

  // ── Material ──
  if (material !== 'ingen') {
    const matColors = {
      papir:'rgba(240,220,180,0.85)', koed:'rgba(200,80,80,0.75)',
      kartofler:'rgba(180,160,60,0.75)', fisk:'rgba(60,160,200,0.75)',
      jern:'rgba(120,130,150,0.85)', bly:'rgba(60,70,90,0.92)'
    };
    const matEmoji = { papir:'📄', koed:'🥩', kartofler:'🥔', fisk:'🐟', jern:'🔩', bly:'⚫' };

    ctx.fillStyle = matColors[material] || 'rgba(150,150,150,0.7)';
    ctx.strokeStyle = '#334155';
    ctx.lineWidth = 1.5;
    roundRect(ctx, MAT_X, 20, MAT_W, H-40, 6);
    ctx.fill(); ctx.stroke();

    ctx.font = '20px serif';
    ctx.textAlign = 'center';
    ctx.fillText(matEmoji[material]||'?', MAT_X + MAT_W/2, H/2 - 14);

    ctx.save();
    ctx.translate(MAT_X + MAT_W/2, H/2 + 14);
    ctx.rotate(-Math.PI/2);
    ctx.font = 'bold 10px "Exo 2", sans-serif';
    ctx.fillStyle = '#e2e8f0';
    ctx.fillText(material.toUpperCase(), 0, 4);
    ctx.restore();
  }

  // ── Geiger tube ──
  const gp = geigerPulse;
  const gc = `rgba(34,197,94,${0.15 + gp*0.5})`;

  // Glow when pulsing
  if (gp > 0) {
    const gg = ctx.createRadialGradient(GEI_X, GEI_Y, 10, GEI_X, GEI_Y, 90);
    gg.addColorStop(0, `rgba(34,197,94,${gp*0.6})`);
    gg.addColorStop(1, 'transparent');
    ctx.fillStyle = gg;
    ctx.fillRect(GEI_X-90, GEI_Y-90, 180, 180);
  }

  // Tube body
  ctx.fillStyle = '#111827';
  ctx.strokeStyle = gp > 0.3 ? '#22c55e' : '#1e3a5f';
  ctx.lineWidth = 2.5;
  roundRect(ctx, GEI_X - GEI_W/2, GEI_Y - GEI_H/2, GEI_W, GEI_H, 10);
  ctx.fill(); ctx.stroke();

  // Inner tube
  ctx.fillStyle = `rgba(34,197,94,${0.06 + gp*0.2})`;
  roundRect(ctx, GEI_X - GEI_W/2 + 8, GEI_Y - GEI_H/2 + 10, GEI_W-16, GEI_H-20, 6);
  ctx.fill();

  // Detection window (left side)
  ctx.strokeStyle = '#22c55e';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(GEI_X - GEI_W/2, GEI_Y-20);
  ctx.lineTo(GEI_X - GEI_W/2, GEI_Y+20);
  ctx.stroke();

  // Label
  ctx.fillStyle = '#22c55e';
  ctx.font = 'bold 10px "Orbitron", monospace';
  ctx.textAlign = 'center';
  ctx.fillText('GEIGER', GEI_X, GEI_Y - GEI_H/2 - 8);

  // Count display
  ctx.fillStyle = gp > 0.5 ? '#86efac' : '#22c55e';
  ctx.font = `bold ${gp>0.5?'18':'15'}px "Orbitron", monospace`;
  ctx.fillText(detected, GEI_X, GEI_Y + 6);

  ctx.fillStyle = '#475569';
  ctx.font = '9px "Exo 2", sans-serif';
  ctx.fillText('opfanget', GEI_X, GEI_Y + 18);

  // Click tick lines
  if (gp > 0.6) {
    ctx.strokeStyle = `rgba(134,239,172,${gp})`;
    ctx.lineWidth = 1.5;
    for (let i=0;i<4;i++) {
      const a = (i/4)*Math.PI*2 + frame*0.1;
      ctx.beginPath();
      ctx.moveTo(GEI_X + Math.cos(a)*GEI_W*0.55, GEI_Y + Math.sin(a)*GEI_H*0.55);
      ctx.lineTo(GEI_X + Math.cos(a)*GEI_W*0.75, GEI_Y + Math.sin(a)*GEI_H*0.75);
      ctx.stroke();
    }
  }

  // Pulse decay
  if (geigerPulse > 0) geigerPulse = Math.max(0, geigerPulse - 0.06);
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r, y);
  ctx.lineTo(x+w-r, y);
  ctx.quadraticCurveTo(x+w, y, x+w, y+r);
  ctx.lineTo(x+w, y+h-r);
  ctx.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
  ctx.lineTo(x+r, y+h);
  ctx.quadraticCurveTo(x, y+h, x, y+h-r);
  ctx.lineTo(x, y+r);
  ctx.quadraticCurveTo(x, y, x+r, y);
  ctx.closePath();
}

// ── Main loop ──────────────────────────────────────────────────────────────
function loop() {
  frame++;
  drawScene();
  maybeSpawn();

  // Update & draw particles
  particles = particles.filter(p => p.alive);
  for (const p of particles) { p.update(); p.draw(); }

  requestAnimationFrame(loop);
}

// ── UI handlers ────────────────────────────────────────────────────────────
function setType(t) {
  type = t;
  document.querySelectorAll('.btn-alpha,.btn-beta,.btn-gamma').forEach(b => b.classList.remove('active'));
  document.querySelector('.btn-'+t).classList.add('active');
  updateInfo();
}

function setMaterial(m) {
  material = m;
  document.querySelectorAll('.btn-mat').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  updateInfo();
}

function setRate(v) {
  rate = parseInt(v);
  document.getElementById('rateVal').textContent = v;
}

function resetCounters() {
  emitted = blocked = detected = 0;
  particles = [];
  updateStats();
}

function updateStats() {
  document.getElementById('sEmit').textContent   = emitted;
  document.getElementById('sBlock').textContent  = blocked;
  document.getElementById('sDetect').textContent = detected;
}

function updateInfo() {
  const matText = material !== 'ingen' ? ' – ' + matInfo[material] : '';
  document.getElementById('infoBox').innerHTML = typeInfo[type] + (material !== 'ingen' ? '<br><br>' + matInfo[material] : '');
}

updateInfo();
loop();
</script>
</body>
</html>
